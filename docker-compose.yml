services:
  openclaw-gateway:
    build:
      context: ./volume_openclaw
      args:
        OPENCLAW_IMAGE: ${OPENCLAW_IMAGE:-alpine/openclaw:main}
    expose:
      - "18789"
    env_file:
      - .env
    environment:
      HOME: /home/node
      TERM: xterm-256color
      NODE_OPTIONS: "--max-old-space-size=2048"
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
    volumes:
      - openclaw_config:/home/node/.openclaw
      - opencode_config:/home/node/.config/opencode
      - gh_config:/home/node/.config/gh
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  openclaw_config:
  opencode_config:
  gh_config:
