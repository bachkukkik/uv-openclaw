services:
  openclaw-gateway:
    build:
      context: ./volume_openclaw
      args:
        OPENCLAW_IMAGE: ${OPENCLAW_IMAGE:-alpine/openclaw:main}
    expose:
      - "18789"
    environment:
      HOME: /home/node
      TERM: xterm-256color
      NODE_OPTIONS: "--max-old-space-size=2048"
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:?Please set OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_GATEWAY_PORT: ${OPENCLAW_GATEWAY_PORT:-18789}
      OPENCLAW_GATEWAY_BIND: ${OPENCLAW_GATEWAY_BIND:-lan}
      OPENCLAW_GATEWAY_ALLOW_INSECURE_AUTH: ${OPENCLAW_GATEWAY_ALLOW_INSECURE_AUTH:-true}
      OPENCLAW_GATEWAY_DANGEROUSLY_DISABLE_DEVICE_AUTH: ${OPENCLAW_GATEWAY_DANGEROUSLY_DISABLE_DEVICE_AUTH:-true}
      OPENCLAW_GATEWAY_DANGEROUSLY_ALLOW_HOST_HEADER_ORIGIN_FALLBACK: ${OPENCLAW_GATEWAY_DANGEROUSLY_ALLOW_HOST_HEADER_ORIGIN_FALLBACK:-true}
      OPENCLAW_GATEWAY_NO_PROMPT: "1"
      OPENCLAW_GATEWAY_NO_ONBOARD: "1"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_BASE: ${OPENAI_API_BASE:-}
      DEFAULT_MODEL_PROVIDER: ${DEFAULT_MODEL_PROVIDER:-openai}
      OPENAI_DEFAULT_MODEL: ${OPENAI_DEFAULT_MODEL:-openai/gpt-4o}
      OPENAI_DEFAULT_MODEL_CONTEXT_WINDOW: ${OPENAI_DEFAULT_MODEL_CONTEXT_WINDOW:-262144}
      OPENAI_DEFAULT_MODEL_MAX_TOKENS: ${OPENAI_DEFAULT_MODEL_MAX_TOKENS:-8192}
      BROWSERLESS_BASE_URL: ${BROWSERLESS_BASE_URL}
      BROWSERLESS_TOKEN: ${BROWSERLESS_TOKEN}
      OPENCLAW_OVERRIDE_CONFIG: ${OPENCLAW_OVERRIDE_CONFIG:-false}
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
    volumes:
      - openclaw_config:/home/node/.openclaw
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - dokploy-network

volumes:
  openclaw_config:

networks:
  dokploy-network:
    external: true
